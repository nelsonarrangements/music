<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found — Nelson Arrangements</title>
  <link rel="icon" type="image/png" href="/images/piano.png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Source+Sans+3:wght@400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #faf8f4;
      color: #2c2c2c;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .eyebrow {
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8b4513;
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 400;
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    h1 em {
      font-style: italic;
      color: #8b4513;
    }

    p {
      font-size: 1.1rem;
      color: #7a6a5a;
      max-width: 38ch;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    a.btn {
      display: inline-block;
      background: #8b4513;
      color: #fff;
      font-family: 'Source Sans 3', system-ui, sans-serif;
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 0.75rem 1.75rem;
      border-radius: 6px;
      transition: background 0.2s ease;
    }

    a.btn:hover { background: #6b340f; }
  </style>
</head>
<body>
  <p class="eyebrow">404 — Page not found</p>
  <h1>Lost in the <em>loft</em>.</h1>
  <p>The page you're looking for doesn't exist or may have moved when the site was redesigned.</p>
  <a class="btn" href="/">Back to Home</a>
</body>
</html>
